name: Deploy Jarvis Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: vincent
          password: ${{ secrets.VPS_PASSWORD }}
          script: ~/deploy-jarvis.sh
          command_timeout: 10m
